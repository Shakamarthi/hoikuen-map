<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>保育園候補マップ PC版</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><link rel="stylesheet" href="style-common.css"><link rel="stylesheet" href="style-pc.css"></head><body><div class="app"><div class="header"><div><div class="title">西葛西・清新町 保育園候補マップ</div><div class="subtitle">候補園の位置・種別・公式WEB・Google Mapsを確認できます。</div></div><div class="switch"><a class="btn small" href="index.html">トップ</a><a class="btn small" href="mobile.html">スマホ版</a><a class="btn small" href="pc.html">PC版</a></div></div><div class="body"><aside class="sidebar"><div class="notice">PC版は外部地図タイルを使用します。表示が不安定な場合でも、左リストと軽量マップは利用できます。</div><div class="controls"><input id="search" type="search" placeholder="園名・住所・メモで検索"><div class="control-grid"><select id="priority"><option value="all">優先度：すべて</option><option value="S">S：本命</option><option value="A">A：第二候補</option><option value="B">B：保険</option><option value="BCP">BCP：認可外</option></select><select id="type"><option value="all">種別：すべて</option><option value="認可・私立">認可・私立</option><option value="認可・区立">認可・区立</option><option value="企業主導型">企業主導型・認可外</option></select></div></div><div class="legend"><span><i class="dot s"></i>S 本命</span><span><i class="dot a"></i>A 第二候補</span><span><i class="dot b"></i>B 保険</span><span><i class="dot bcp"></i>BCP 認可外</span></div><div id="count" class="count"></div><div id="list" class="list"></div><div class="footnote">注：一部座標は住所ベースの近似です。正式な申込・見学前には各園または江戸川区公式情報で確認してください。</div></aside><main class="mapwrap"><div id="map" class="map"></div><div class="fallback"><div class="fallback-title">軽量マップ表示</div><div id="fallbackGrid" class="fallback-grid"></div></div></main></div></div><script src="data.js"></script><script src="app-common.js"></script><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="app-pc.js"></script></body></html>
