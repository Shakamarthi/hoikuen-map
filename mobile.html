<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>保育園候補マップ スマホ版</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQmM/3P56aUSJpIh9s4K/twoqjYcQ6Y=" crossorigin="">
  <link rel="stylesheet" href="style-common.css">
  <link rel="stylesheet" href="style-mobile.css">
</head>
<body>
<div class="mobile-app">
  <div class="header">
    <div>
      <div class="title">西葛西・清新町 保育園候補マップ</div>
      <div class="subtitle">候補園の位置・種別・公式WEB・Google Mapsを確認できます。</div>
    </div>
    <div class="switch"><a class="btn small" href="index.html">トップ</a><a class="btn small" href="mobile.html">スマホ版</a><a class="btn small" href="pc.html">PC版</a></div>
  </div>

  <div id="m-map" class="mobile-map real-map"></div>
  <div id="map-status" class="map-status">地図を読み込み中...</div>

  <div class="mobile-controls">
    <div class="install">Safariで共有ボタン →「ホーム画面に追加」でアプリ風に使えます。</div>
    <div class="controls">
      <input id="m-search" type="search" placeholder="園名・住所・メモで検索">
      <div class="control-grid">
        <select id="m-priority"><option value="all">優先度：すべて</option><option value="S">S：本命</option><option value="A">A：第二候補</option><option value="B">B：保険</option><option value="BCP">BCP：認可外</option></select>
        <select id="m-type"><option value="all">種別：すべて</option><option value="認可・私立">認可・私立</option><option value="認可・区立">認可・区立</option><option value="企業主導型">企業主導型・認可外</option></select>
      </div>
    </div>
    <div class="legend"><span><i class="dot s"></i>S 本命</span><span><i class="dot a"></i>A 第二候補</span><span><i class="dot b"></i>B 保険</span><span><i class="dot bcp"></i>BCP 認可外</span></div>
    <div id="m-count" class="count"></div>
  </div>
  <div id="m-list" class="mobile-list"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="data.js"></script>
<script src="app-common.js"></script>
<script src="app-mobile.js"></script>
</body>
</html>
