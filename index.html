<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>保育園候補マップ</title><link rel="stylesheet" href="style-common.css"><style>body{display:grid;place-items:center;min-height:100dvh}.panel{width:min(680px,calc(100% - 28px));background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 8px 28px rgba(15,23,42,.08)}h1{margin:0 0 8px;font-size:24px}.lead{color:#475569;line-height:1.6}.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}.choice{display:block;text-decoration:none;border:1px solid var(--line);border-radius:16px;padding:16px;background:#f8fafc}.choice b{display:block;font-size:18px;margin-bottom:6px}.choice span{color:#475569;font-size:13px;line-height:1.5}@media(max-width:700px){.choices{grid-template-columns:1fr}}</style><script>window.addEventListener('DOMContentLoaded',()=>{const small=matchMedia('(max-width: 820px)').matches; const auto=document.getElementById('auto'); auto.href=small?'mobile.html':'pc.html'; auto.textContent=small?'スマホ版を開く':'PC版を開く';});</script></head><body><div class="panel"><h1>保育園候補マップ</h1><div class="lead">端末サイズに応じて、PC版またはスマホ版を使い分けできます。公開先ではこのページをトップにしてください。</div><div class="choices"><a id="auto" class="choice" href="pc.html"><b>自動判定版</b><span>今の画面サイズに合う表示を開きます。</span></a><a class="choice" href="pc.html"><b>PC版</b><span>左リスト＋右地図。PCブラウザ向け。</span></a><a class="choice" href="mobile.html"><b>スマホ版</b><span>上に地図、下に園カード。iPhone/Safari向け。</span></a></div></div></body></html>
