<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>保育園候補マップ v7.2</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<header>
  <div>
    <h1>保育園候補マップ v7.2</h1>
    <p>認可0歳候補＋認可外BCP統合版 / 清新町・西葛西中心、東葛西・南葛西は低優先で保持</p>
  </div>
  <div class="header-actions">
    <a href="https://www.city.edogawa.tokyo.jp/e047/kuseijoho/gaiyo/shisetsuguide/bunya/kosodate/hoikuen/index.html" target="_blank">江戸川区公式</a>
  </div>
</header>

<main>
  <section id="sidebar">
    <div class="filters">
      <label>区分
        <select id="kindFilter">
          <option value="all">すべて</option>
          <option value="認可">認可</option>
          <option value="bcp">認可外BCP</option>
        </select>
      </label>
      <label>優先度
        <select id="priorityFilter">
          <option value="all">すべて</option>
          <option value="S">S</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C/遠方保険</option>
          <option value="BCP-S">BCP-S</option>
          <option value="BCP-A">BCP-A</option>
          <option value="BCP-B">BCP-B</option>
          <option value="BCP-C">BCP-C</option>
        </select>
      </label>
      <input id="searchBox" type="search" placeholder="園名・エリア検索">
    </div>
    <div id="summary"></div>
    <div id="list"></div>
  </section>
  <section id="mapwrap">
    <div id="map"></div>
    <div id="fallback" hidden>
      <h2>地図を読み込めませんでした</h2>
      <p>リストの「Google Maps」から位置を確認してください。</p>
    </div>
  </section>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./data.js"></script>
<script src="./app.js"></script>
</body>
</html>
